<!DOCTYPE html>
<html>
<head>
    <title>Change the Facebook interface</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <link rel="stylesheet" href="css/popup.css"/>
    <link rel="stylesheet" href="css/jquery.minicolors.css">
    <script src="js/jquery.js"></script>
    <script src="js/jquery.minicolors.js"></script>
    <style>
        html, body {
            height: auto;
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
            box-sizing: border-box;
            width: 390px;
            padding: 0;
            margin: 0;
            text-align: center;
        }
        a{text-decoration: none;}
        #header{
            height: auto;
            text-align: center; padding: 15px; font-size: 15px;border-bottom: 1px solid #3578E5;color: #3578E5;font-weight: 300;
        }
        #header>div{
            display: inline-block;
            vertical-align: middle;
            color: white;
        }
        .scroll {
            overflow-y: auto;
            height: 430px;

        }
        .btn{
            cursor: pointer;
            background-color: #3578E5;
            color: white;
            border: 1px solid #3578E5;
            border-radius: 2px;
            font-size: 16px;
            padding: 7px 20px;
            text-align: center;
            vertical-align: middle;
        }
        .btn2{
            cursor: pointer;
            background-color: #f5f6f7;
            border:1px solid #ccd0d5;
            color: #4b4f56;
            border-radius: 2px;
            font-size: 14px;
            padding: 3px 7px;
            margin-left: 5px;
            text-align: center;
            vertical-align: middle;
            display: inline-block;
        }
        .bgoption.active{
            background-color: #3578E5;
            color: white;
        }
        .btn:hover{background-color: #29487d;}
        .btn2:hover{background-color: rgba(0,0,0,0.1);color: #111;}
        .bgoption.active:hover{
            background-color: #29487d;
            color: white;
        }
        .info{
            width: 390px;
        }
        .box{
            padding: 10px 20px 6px 20px;
        }
        .col1{
            text-align: left;
            display: inline-block;
            width: 130px;
            padding-left: 10px;
            vertical-align: middle;
            color: white;
        }
        .col2{
            display: inline-block;
            width: 200px;
            vertical-align: middle;
        }
        .col3{
            text-align: right;
            display: inline-block;
            width: 50px;
            padding-left: 10px;
            vertical-align: middle;
        }
        .minicolors-swatch-color{
            border: 1px solid #c0c0c0;
            cursor: pointer;
        }
        .minicolors-with-opacity .minicolors-swatches .minicolors-swatch {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div id="header">
        <div><img src="logo.png" style="width: 32px;border: 0;margin-right: 10px;"></div>
        <div>Style</div>
        <div class="options-switch" id="options-switch" title="on/off">
            <div></div>
        </div>
    </div>
    <div class="scroll" id="wrapper">
        <div class="box boxa">
            <div class="col2">
                <input type="hidden" id="color_a" class="color" value="#3578E5" data-control="wheel" data-format="rgb" data-opacity="1" data-swatches="rgba(255,255,0,0.4)|rgba(124,0,64,0.4)|rgba(255,0,0,0.4)|rgba(0,255,0,0.4)|rgba(255,0,255,0.4)|rgba(0,255,255,0.4)|rgba(0,0,255,0.4)">
            </div>
            <div class="col1">Header</div>
        </div>
        <div class="box boxb">
            <div class="col2">
                <input type="hidden" id="color_b" class="color" value="rgba(200, 201, 204, 0.58)" data-control="wheel" data-format="rgb" data-opacity="1" data-swatches="rgba(255,0,0,0)|rgba(255,255,255,0.5)|rgba(0,0,0,0.5)|rgba(0,255,0,0.5)|rgba(255,0,255,0.5)|rgba(255,255,0,0.5)|rgba(0,0,255,0.5)">
            </div>
            <div class="col1">Background</div>
        </div>
        <div class="box boxc">
            <div class="col2">
                <input type="hidden" id="color_c" class="color" value="#3b3480" data-control="wheel" data-swatches="#fff|#000|#f00|#0f0|#00f|#ff0">
            </div>
            <div class="col1">Text</div>
        </div>
        <div class="box boxd">
            <div class="col2">
                <input type="hidden" id="color_d" class="color" value="#183c75" data-control="wheel" data-swatches="#fff|#000|#f00|#0f0|#00f|#ff0">
            </div>
            <div class="col1">Links</div>
        </div>
        <div class="box boxe">
            <div class="col2">
                <input type="hidden" id="color_e" class="color" value="rgba(200, 201, 204, 0.58)" data-control="wheel" data-format="rgb" data-opacity="1" data-swatches="rgba(255,0,0,0)|rgba(255,255,255,0.5)|rgba(0,0,0,0.5)|rgba(0,255,0,0.5)|rgba(255,0,255,0.5)|rgba(0,255,255,0.5)|rgba(0,0,255,0.5)">
            </div>
            <div class="col1">Boxes</div>
        </div>
        <div class="box">
            <div class="col2">
                <div class="photo-browser" id="images">
                    <div id="bg"></div>
                    <input type="file" style="display: none;">
                </div>
            </div>
            <div class="col1">
                <div id="image" class="btn">Load image</div>
            </div>
            <div style="padding-top:10px">
                <div class="btn2 bgoption" data-value="full">Fullscreen</div>
                <div class="btn2 bgoption" data-value="fit">Inner</div>
                <div class="btn2 bgoption active" data-value="repeat">Repeat</div>
                <div class="btn2 bgoption" data-value="center">Centered</div>
            </div>
        </div>
    <script src="js/analytics.js" type="text/javascript"></script>
    <script src="js/demo.js" type="text/javascript"></script>
    <script src="js/popup.js" type="text/javascript"></script>
</body>
</html>
